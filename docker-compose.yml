version: '3.8'

services:

  # ─── SERVICE UTAMA ───────────────────────────────────────────
  distribusi_obat:
    build:
      context: .
      dockerfile: docker/distribusi_obat.Dockerfile
    container_name: epharma_main
    restart: unless-stopped
    environment:
      APP_NAME: "E-Pharma"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${MAIN_APP_URL}
      APP_KEY: ${MAIN_APP_KEY}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: e_pharma
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION}
      MIDTRANS_IS_SANITIZED: "true"
      MIDTRANS_IS_3DS: "true"
      REPORT_SERVICE_URL: ${REPORT_SERVICE_URL}
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ssl
      MAIL_FROM_ADDRESS: ${MAIL_USERNAME}
      MAIL_FROM_NAME: "E-PHARMA LOGISTICS"
      QUEUE_CONNECTION: database
      SESSION_DRIVER: file
      CACHE_STORE: file
      FILESYSTEM_DISK: public
      LOG_LEVEL: error
    volumes:
      - main_storage:/var/www/html/storage/app/public
      - main_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - epharma_network

  # ─── AUTH SERVICE ─────────────────────────────────────────────
  auth_service:
    build:
      context: .
      dockerfile: docker/auth_service.Dockerfile
    container_name: epharma_auth
    restart: unless-stopped
    environment:
      APP_NAME: "E-Pharma Auth"
      APP_ENV: production
      APP_DEBUG: "true"
      APP_URL: ${AUTH_SERVICE_URL}
      APP_KEY: ${AUTH_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: db_auth
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ssl
      MAIL_FROM_ADDRESS: ${MAIL_USERNAME}
      MAIL_FROM_NAME: "E-PHARMA LOGISTICS"
      QUEUE_CONNECTION: database
      SESSION_DRIVER: file
      CACHE_STORE: file
      LOG_LEVEL: debug
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - epharma_network

  # ─── REPORT SERVICE ───────────────────────────────────────────
  report_service:
    build:
      context: .
      dockerfile: docker/report_service.Dockerfile
    container_name: epharma_report
    restart: unless-stopped
    environment:
      APP_NAME: "E-Pharma Report"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${REPORT_SERVICE_URL}
      APP_KEY: ${REPORT_APP_KEY}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: db_report
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      # Di production tidak perlu port 8003 lagi — PHP-FPM multi-process, tidak ada deadlock
      MAIN_APP_URL: ${MAIN_APP_URL}
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      LOG_LEVEL: error
    depends_on:
      mysql:
        condition: service_healthy
      distribusi_obat:
        condition: service_started
    networks:
      - epharma_network

  # ─── MYSQL ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: epharma_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      # Database utama dibuat otomatis dari sini
      MYSQL_DATABASE: e_pharma
    volumes:
      - mysql_data:/var/lib/mysql
      # Script ini buat db_auth dan db_report saat pertama kali
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 5s
    networks:
      - epharma_network

  # ─── NGINX REVERSE PROXY ──────────────────────────────────────
  nginx_proxy:
    image: nginx:alpine
    container_name: epharma_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-proxy.conf:/etc/nginx/conf.d/default.conf
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - distribusi_obat
      - auth_service
      - report_service
    networks:
      - epharma_network

  # ─── CERTBOT (SSL gratis, auto-renew) ─────────────────────────
  certbot:
    image: certbot/certbot
    container_name: epharma_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  mysql_data:
  main_storage:
  main_logs:
  certbot_conf:
  certbot_www:

networks:
  epharma_network:
    driver: bridge